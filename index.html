<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1">
<title>TITO SMM PANEL</title><style>

body{
font-family:Arial;
background:#050b18;
color:white;
margin:0;
}

.header{
background:#0f1b2e;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.platforms{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
padding:16px;
background:#081326;
}

.platform{
width:46px;
height:46px;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
border-radius:10px;
cursor:pointer;
}

.platform img{
width:24px;
height:24px;
object-fit:contain;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

label{
font-size:14px;
color:#9ca3af;
}

select,input{
width:100%;
padding:13px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

.description{
background:#111827;
padding:14px;
border-radius:8px;
font-size:13px;
color:#cbd5e1;
margin-bottom:16px;
line-height:1.5;
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
}

</style></head><body><div class="header">
TITO SMM PANEL
</div><div class="platforms"><div class="platform" onclick="setPlatform('instagram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div><div class="platform" onclick="setPlatform('youtube')">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</div><div class="platform" onclick="setPlatform('telegram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div><div class="platform" onclick="setPlatform('tiktok')">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</div><div class="platform" onclick="setPlatform('facebook')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</div><div class="platform" onclick="setPlatform('twitter')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png">
</div><div class="platform" onclick="setPlatform('spotify')">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</div></div><div class="container"><label>Category</label>

<select id="category" onchange="loadServices()"></select>

<label>Service</label>

<select id="service" onchange="showDescription()"></select>

<label>Service Description</label>

<div id="desc" class="description">
Select a service to view description.
</div><label>Link</label>
<input id="link" placeholder="Paste link">

<label>Quantity</label>
<input id="qty" placeholder="Example 1000">

<button onclick="order()">Submit Order</button>

</div><script>

var platform="instagram"

function setPlatform(p){
platform=p
updateCategories()
}

function updateCategories(){

var category=document.getElementById("category")

category.innerHTML=""

if(platform=="instagram"){
category.innerHTML+=`<option value="followers">Followers</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
category.innerHTML+=`<option value="views">Views</option>`
category.innerHTML+=`<option value="comments">Comments</option>`
category.innerHTML+=`<option value="reels">Reel Packages</option>`
category.innerHTML+=`<option value="fpackages">Follower Packages</option>`
category.innerHTML+=`<option value="engagement">Engagement Packages</option>`
category.innerHTML+=`<option value="vlikes">Verified Likes</option>`
category.innerHTML+=`<option value="vcomments">Verified Comments</option>`
}

if(platform=="youtube"){
category.innerHTML+=`<option value="subs">Subscribers</option>`
category.innerHTML+=`<option value="views">Views</option>`
category.innerHTML+=`<option value="watchtime">Watch Time</option>`
}

if(platform=="telegram"){
category.innerHTML+=`<option value="members">Members</option>`
category.innerHTML+=`<option value="views">Post Views</option>`
}

if(platform=="tiktok"){
category.innerHTML+=`<option value="followers">Followers</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
category.innerHTML+=`<option value="views">Views</option>`
}

if(platform=="facebook"){
category.innerHTML+=`<option value="followers">Page Followers</option>`
category.innerHTML+=`<option value="likes">Post Likes</option>`
}

if(platform=="twitter"){
category.innerHTML+=`<option value="followers">Followers</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
}

if(platform=="spotify"){
category.innerHTML+=`<option value="plays">Song Plays</option>`
}

loadServices()

}

function loadServices(){

var cat=document.getElementById("category").value
var service=document.getElementById("service")

service.innerHTML=""

if(platform=="instagram" && cat=="followers"){
service.innerHTML+=`<option>1000 Followers</option>`
service.innerHTML+=`<option>5000 Followers</option>`
}

if(platform=="instagram" && cat=="comments"){
service.innerHTML+=`<option>Random Comments</option>`
service.innerHTML+=`<option>Custom Comments</option>`
}

if(platform=="instagram" && cat=="reels"){
service.innerHTML+=`<option>Reel Boost Package</option>`
}

if(platform=="instagram" && cat=="engagement"){
service.innerHTML+=`<option>Starter Engagement Package</option>`
}

if(platform=="youtube" && cat=="subs"){
service.innerHTML+=`<option>1000 Subscribers</option>`
}

if(platform=="youtube" && cat=="watchtime"){
service.innerHTML+=`<option>4000 Watch Hours</option>`
}

if(platform=="telegram" && cat=="members"){
service.innerHTML+=`<option>10000 Members</option>`
}

if(platform=="spotify" && cat=="plays"){
service.innerHTML+=`<option>10000 Plays</option>`
}

showDescription()

}

var descriptions={

"1000 Followers":"Gradual delivery followers designed to help accounts grow naturally.",
"5000 Followers":"Larger growth package ideal for influencers and brands.",
"Random Comments":"Automatic comments randomly generated for engagement.",
"Custom Comments":"You provide comments and they will be posted manually.",
"Reel Boost Package":"Boost reel reach and improve discoverability.",
"Starter Engagement Package":"Balanced mix of followers likes and views.",
"1000 Subscribers":"Subscriber growth for YouTube channels.",
"4000 Watch Hours":"Package designed for monetization eligibility.",
"10000 Members":"Telegram group member growth service.",
"10000 Plays":"Spotify play boost service."

}

function showDescription(){

var service=document.getElementById("service").value

if(descriptions[service]){
document.getElementById("desc").innerText=descriptions[service]
}else{
document.getElementById("desc").innerText="Service details will appear here."
}

}

function order(){

var service=document.getElementById("service").value
var link=document.getElementById("link").value
var qty=document.getElementById("qty").value

var phone="917207207597"

var msg="New Order%0APlatform: "+platform+"%0AService: "+service+"%0ALink: "+link+"%0AQuantity: "+qty

window.open("https://wa.me/"+phone+"?text="+msg)

}

updateCategories()

</script></body>
</html>
