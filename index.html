<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TITO SMM PANEL</title><style>

:root{
--bg:#050b18;
--card:#1f2937;
--header:#0f1b2e;
--text:#ffffff;
--muted:#9ca3af;
--desc:#111827;
--button:#22c55e;
}

.light{
--bg:#f4f6fb;
--card:#ffffff;
--header:#e8edf6;
--text:#111827;
--muted:#6b7280;
--desc:#eef1f6;
--button:#16a34a;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
margin:0;
}

.header{
background:var(--header);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.toggle{
cursor:pointer;
padding:6px 10px;
background:var(--card);
border-radius:6px;
font-size:14px;
}

.platforms{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
padding:16px;
background:var(--header);
}

.platform{
width:46px;
height:46px;
display:flex;
align-items:center;
justify-content:center;
background:var(--card);
border-radius:10px;
cursor:pointer;
}

.platform img{
width:24px;
height:24px;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

label{
font-size:14px;
color:var(--muted);
}

select,input{
width:100%;
padding:13px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:none;
background:var(--card);
color:var(--text);
font-size:14px;
}

.description{
background:var(--desc);
padding:14px;
border-radius:8px;
font-size:13px;
margin-bottom:16px;
line-height:1.5;
}

.pricebox{
background:var(--card);
padding:12px;
border-radius:8px;
margin-bottom:16px;
font-size:13px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:6px;
}

button{
width:100%;
padding:15px;
background:var(--button);
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
cursor:pointer;
}

</style></head><body><div class="header">
<span>TITO SMM PANEL</span>
<div class="toggle" onclick="toggleTheme()">🌙/☀️</div>
</div><div class="platforms"><div class="platform" onclick="setPlatform('instagram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div><div class="platform" onclick="setPlatform('youtube')">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</div><div class="platform" onclick="setPlatform('telegram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div><div class="platform" onclick="setPlatform('tiktok')">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</div><div class="platform" onclick="setPlatform('facebook')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</div><div class="platform" onclick="setPlatform('twitter')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png">
</div><div class="platform" onclick="setPlatform('spotify')">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</div></div><div class="container"><label>Category</label>
<select id="category" onchange="loadServices()"></select>

<label>Service</label>
<select id="service" onchange="serviceChanged()"></select>

<label>Service Description</label>

<div id="desc" class="description">
Select a service to view description.
</div><div class="pricebox">Min Order: <span id="min">-</span><br>
Max Order: <span id="max">-</span><br>
Price per 1000: ₹<span id="rate">-</span>

<div class="total">
Total Price: ₹<span id="total">0</span>
</div></div><label>Link</label>
<input id="link" placeholder="Paste link">

<label>Quantity</label>
<input id="qty" placeholder="Example 1000" oninput="calculate()">

<button onclick="order()">Submit Order</button>

</div><script>

var platform="instagram"

function setPlatform(p){
platform=p
updateCategories()
}

function updateCategories(){

var c=document.getElementById("category")

c.innerHTML=""

if(platform=="instagram"){
c.innerHTML+=`<option value="followers">Followers</option>`
c.innerHTML+=`<option value="likes">Likes</option>`
c.innerHTML+=`<option value="views">Views</option>`
c.innerHTML+=`<option value="comments">Comments</option>`
c.innerHTML+=`<option value="reels">Reel Packages</option>`
c.innerHTML+=`<option value="engagement">Engagement Packages</option>`
}

if(platform=="youtube"){
c.innerHTML+=`<option value="subs">Subscribers</option>`
c.innerHTML+=`<option value="views">Views</option>`
c.innerHTML+=`<option value="watchtime">Watch Time</option>`
}

if(platform=="telegram"){
c.innerHTML+=`<option value="members">Members</option>`
}

if(platform=="spotify"){
c.innerHTML+=`<option value="plays">Song Plays</option>`
}

loadServices()

}

var services={

"1000 Followers":{
rate:199,
min:100,
max:100000,
desc:"High quality followers delivered gradually."
},

"5000 Followers":{
rate:899,
min:500,
max:100000,
desc:"Growth package designed for influencers."
},

"Random Comments":{
rate:299,
min:10,
max:5000,
desc:"Automatic random comments to boost engagement."
},

"Custom Comments":{
rate:399,
min:10,
max:5000,
desc:"You provide comments and they will be posted."
},

"1000 Subscribers":{
rate:399,
min:100,
max:50000,
desc:"Subscriber growth for YouTube channels."
},

"4000 Watch Hours":{
rate:4999,
min:4000,
max:4000,
desc:"Helps channels reach monetization requirements."
},

"10000 Members":{
rate:1899,
min:1000,
max:100000,
desc:"Telegram member growth service."
},

"10000 Plays":{
rate:499,
min:1000,
max:100000,
desc:"Boost Spotify track plays."
}

}

function loadServices(){

var cat=document.getElementById("category").value
var s=document.getElementById("service")

s.innerHTML=""

if(platform=="instagram" && cat=="followers"){
s.innerHTML+=`<option>1000 Followers</option>`
s.innerHTML+=`<option>5000 Followers</option>`
}

if(platform=="instagram" && cat=="comments"){
s.innerHTML+=`<option>Random Comments</option>`
s.innerHTML+=`<option>Custom Comments</option>`
}

if(platform=="youtube" && cat=="subs"){
s.innerHTML+=`<option>1000 Subscribers</option>`
}

if(platform=="youtube" && cat=="watchtime"){
s.innerHTML+=`<option>4000 Watch Hours</option>`
}

if(platform=="telegram" && cat=="members"){
s.innerHTML+=`<option>10000 Members</option>`
}

if(platform=="spotify" && cat=="plays"){
s.innerHTML+=`<option>10000 Plays</option>`
}

serviceChanged()

}

function serviceChanged(){

var service=document.getElementById("service").value

var data=services[service]

if(data){

document.getElementById("desc").innerText=data.desc
document.getElementById("rate").innerText=data.rate
document.getElementById("min").innerText=data.min
document.getElementById("max").innerText=data.max

}

calculate()

}

function calculate(){

var qty=document.getElementById("qty").value
var service=document.getElementById("service").value

var data=services[service]

if(!data || !qty)return

var total=(qty/1000)*data.rate

document.getElementById("total").innerText=Math.round(total)

}

function order(){

var service=document.getElementById("service").value
var link=document.getElementById("link").value
var qty=document.getElementById("qty").value

var phone="91XXXXXXXXXX"

var msg="New Order%0APlatform: "+platform+"%0AService: "+service+"%0ALink: "+link+"%0AQuantity: "+qty

window.open("https://wa.me/"+phone+"?text="+msg)

}

function toggleTheme(){
document.body.classList.toggle("light")
}

updateCategories()

</script></body>
</html>
