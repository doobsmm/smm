<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TITO SMM PANEL</title>

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
margin:0;
}

.header{
background:#111827;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.platforms{
display:flex;
justify-content:center;
gap:20px;
padding:15px;
background:#0f172a;
}

.platform{
text-align:center;
cursor:pointer;
}

.platform img{
width:35px;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

label{
font-size:14px;
color:#9ca3af;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
color:white;
}

</style>

</head>

<body>

<div class="header">
TITO SMM PANEL
</div>

<div class="platforms">

<div class="platform" onclick="setPlatform('instagram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div>

<div class="platform" onclick="setPlatform('youtube')">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</div>

<div class="platform" onclick="setPlatform('telegram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div>

</div>

<div class="container">

<label>Category</label>

<select id="category" onchange="loadServices()">

<option>Choose Category</option>

<option value="followers">Followers</option>
<option value="likes">Likes</option>
<option value="views">Views</option>
<option value="members">Members</option>

</select>

<label>Service</label>

<select id="service">

<option>Select Service</option>

</select>

<label>Link</label>

<input id="link" placeholder="Paste link">

<label>Quantity</label>

<input id="qty" placeholder="Example 1000">

<button onclick="order()">Submit Order</button>

</div>

<script>

var platform="instagram"

function setPlatform(p){
platform=p
}

function loadServices(){

var category=document.getElementById("category").value
var service=document.getElementById("service")

service.innerHTML=""

if(platform=="instagram" && category=="followers"){
service.innerHTML+=`<option value="Instagram Followers 1000">1000 Followers ₹199</option>`
}

if(platform=="instagram" && category=="likes"){
service.innerHTML+=`<option value="Instagram Likes 1000">1000 Likes ₹99</option>`
}

if(platform=="instagram" && category=="views"){
service.innerHTML+=`<option value="Instagram Views 10000">10000 Views ₹79</option>`
}

if(platform=="youtube" && category=="followers"){
service.innerHTML+=`<option value="YouTube Subscribers 1000">1000 Subscribers ₹399</option>`
}

if(platform=="telegram" && category=="members"){
service.innerHTML+=`<option value="Telegram Members 10000">10000 Members ₹1899</option>`
}

}

function order(){

var service=document.getElementById("service").value
var link=document.getElementById("link").value
var qty=document.getElementById("qty").value

var phone="917207207597"

var msg="New Order%0APlatform: "+platform+"%0AService: "+service+"%0ALink: "+link+"%0AQuantity: "+qty

window.open("https://wa.me/"+phone+"?text="+msg)

}

</script>

</body>
</html>
