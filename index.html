<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TITO SMM PANEL</title><style>

body{
font-family:Arial;
background:#050b18;
color:white;
margin:0;
}

.header{
background:#0f1b2e;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.platforms{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:18px;
padding:18px;
background:#081326;
}

.platform{
cursor:pointer;
}

.platform img{
width:38px;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

label{
font-size:14px;
color:#9ca3af;
}

select,input{
width:100%;
padding:13px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
}

</style></head><body><div class="header">
TITO SMM PANEL
</div><div class="platforms"><div class="platform" onclick="setPlatform('instagram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div><div class="platform" onclick="setPlatform('youtube')">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</div><div class="platform" onclick="setPlatform('telegram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div><div class="platform" onclick="setPlatform('tiktok')">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</div><div class="platform" onclick="setPlatform('facebook')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</div><div class="platform" onclick="setPlatform('twitter')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png">
</div><div class="platform" onclick="setPlatform('spotify')">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</div></div><div class="container"><label>Category</label>

<select id="category" onchange="loadServices()">
<option value="">Choose Category</option>
</select><label>Service</label>

<select id="service">
<option>Select Service</option>
</select><label>Link</label>
<input id="link" placeholder="Paste link">

<label>Quantity</label>
<input id="qty" placeholder="Example 1000">

<button onclick="order()">Submit Order</button>

</div><script>

var platform="instagram"

function setPlatform(p){
platform=p
updateCategories()
}

function updateCategories(){

var category=document.getElementById("category")

category.innerHTML=""

if(platform=="instagram"){
category.innerHTML+=`<option value="followers">Followers</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
category.innerHTML+=`<option value="views">Views</option>`
category.innerHTML+=`<option value="comments">Comments</option>`
category.innerHTML+=`<option value="reels">Reel Packages</option>`
category.innerHTML+=`<option value="fpackages">Follower Packages</option>`
category.innerHTML+=`<option value="engagement">Engagement Packages</option>`
category.innerHTML+=`<option value="vlikes">Verified Likes</option>`
category.innerHTML+=`<option value="vcomments">Verified Comments</option>`
}

if(platform=="youtube"){
category.innerHTML+=`<option value="subscribers">Subscribers</option>`
category.innerHTML+=`<option value="views">Views</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
category.innerHTML+=`<option value="comments">Comments</option>`
category.innerHTML+=`<option value="watchtime">Watch Time</option>`
}

if(platform=="telegram"){
category.innerHTML+=`<option value="members">Members</option>`
category.innerHTML+=`<option value="views">Post Views</option>`
}

if(platform=="tiktok"){
category.innerHTML+=`<option value="followers">Followers</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
category.innerHTML+=`<option value="views">Views</option>`
}

if(platform=="facebook"){
category.innerHTML+=`<option value="followers">Page Followers</option>`
category.innerHTML+=`<option value="likes">Post Likes</option>`
category.innerHTML+=`<option value="views">Video Views</option>`
}

if(platform=="twitter"){
category.innerHTML+=`<option value="followers">Followers</option>`
category.innerHTML+=`<option value="likes">Likes</option>`
category.innerHTML+=`<option value="retweets">Retweets</option>`
}

if(platform=="spotify"){
category.innerHTML+=`<option value="plays">Song Plays</option>`
category.innerHTML+=`<option value="followers">Artist Followers</option>`
}

loadServices()

}

function loadServices(){

var category=document.getElementById("category").value
var service=document.getElementById("service")

service.innerHTML=""

if(platform=="instagram" && category=="followers"){
service.innerHTML+=`<option>1000 Followers ₹199</option>`
service.innerHTML+=`<option>5000 Followers ₹899</option>`
}

if(platform=="instagram" && category=="likes"){
service.innerHTML+=`<option>1000 Likes ₹99</option>`
}

if(platform=="instagram" && category=="views"){
service.innerHTML+=`<option>10000 Views ₹79</option>`
}

if(platform=="instagram" && category=="comments"){
service.innerHTML+=`<option>Random Comments 100 ₹199</option>`
service.innerHTML+=`<option>Custom Comments 100 ₹299</option>`
}

if(platform=="instagram" && category=="reels"){
service.innerHTML+=`<option>Reel Boost Package ₹299</option>`
service.innerHTML+=`<option>Reel Viral Package ₹799</option>`
}

if(platform=="instagram" && category=="fpackages"){
service.innerHTML+=`<option>Starter Follower Package ₹499</option>`
service.innerHTML+=`<option>Influencer Follower Package ₹1499</option>`
}

if(platform=="instagram" && category=="engagement"){
service.innerHTML+=`<option>Starter Engagement Package ₹399</option>`
service.innerHTML+=`<option>Pro Engagement Package ₹999</option>`
}

if(platform=="instagram" && category=="vlikes"){
service.innerHTML+=`<option>Verified Likes 100 ₹299</option>`
}

if(platform=="instagram" && category=="vcomments"){
service.innerHTML+=`<option>Verified Random Comments ₹399</option>`
service.innerHTML+=`<option>Verified Custom Comments ₹499</option>`
}

if(platform=="youtube" && category=="subscribers"){
service.innerHTML+=`<option>1000 Subscribers ₹399</option>`
}

if(platform=="youtube" && category=="views"){
service.innerHTML+=`<option>10000 Views ₹299</option>`
}

if(platform=="youtube" && category=="watchtime"){
service.innerHTML+=`<option>4000 Watch Hours ₹4999</option>`
}

if(platform=="telegram" && category=="members"){
service.innerHTML+=`<option>10000 Members ₹1899</option>`
}

if(platform=="tiktok" && category=="followers"){
service.innerHTML+=`<option>1000 Followers ₹249</option>`
}

if(platform=="facebook" && category=="followers"){
service.innerHTML+=`<option>1000 Page Followers ₹299</option>`
}

if(platform=="twitter" && category=="followers"){
service.innerHTML+=`<option>1000 Followers ₹349</option>`
}

if(platform=="spotify" && category=="plays"){
service.innerHTML+=`<option>10000 Plays ₹499</option>`
}

}

function order(){

var service=document.getElementById("service").value
var link=document.getElementById("link").value
var qty=document.getElementById("qty").value

var phone="917207207597"

var msg="New Order%0APlatform: "+platform+"%0AService: "+service+"%0ALink: "+link+"%0AQuantity: "+qty

window.open("https://wa.me/"+phone+"?text="+msg)

}

updateCategories()

</script></body>
</html>
