<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1">
<title>doob panel</title><style>

body{
margin:0;
font-family:Arial;
background:#070d1c;
color:white;
display:flex;
}

.sidebar{
width:230px;
background:#0f172a;
height:100vh;
padding:20px;
box-sizing:border-box;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.menu button{
width:100%;
background:none;
border:none;
color:white;
padding:12px;
text-align:left;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#1f2937;
}

.main{
flex:1;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.card{
background:#1f2937;
padding:16px;
border-radius:10px;
margin-bottom:16px;
}

.section{
display:none;
}

.section.active{
display:block;
}

select,input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#111827;
color:white;
}

button.primary{
background:#22c55e;
border:none;
padding:12px;
border-radius:8px;
width:100%;
color:white;
font-weight:bold;
cursor:pointer;
}

.table{
width:100%;
border-collapse:collapse;
}

.table td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.stat-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.stat{
background:#1f2937;
padding:14px;
border-radius:8px;
text-align:center;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#1f2937;
padding:20px;
border-radius:10px;
width:300px;
}

</style></head><body><div class="sidebar"><div class="logo">doob</div><div class="menu"><button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('order')">New Order</button>
<button onclick="showSection('services')">Services</button>
<button onclick="showSection('orders')">Orders</button>
<button onclick="showSection('admin')">Admin</button>

</div></div><div class="main"><div class="topbar"><h2 id="title">Dashboard</h2><div>Balance: ₹<span id="balance">5000</span></div></div><div id="dashboard" class="section active"><div class="stat-grid"><div class="stat">
<h3 id="s1">0</h3>
Services
</div><div class="stat">
<h3 id="s2">0</h3>
Orders
</div><div class="stat">
<h3 id="s3">0</h3>
Users
</div><div class="stat">
<h3 id="s4">0</h3>
Online
</div></div></div><div id="order" class="section"><div class="card"><input id="search" placeholder="Search service..." onkeyup="searchService()"><select id="service" onchange="serviceChanged()"></select>

<div class="card">Service ID: <span id="sid"></span><br>
Min: <span id="min"></span><br>
Max: <span id="max"></span><br>
Rate/1000: ₹<span id="rate"></span>

<div>
Total: ₹<span id="total">0</span>
</div></div><input id="link" placeholder="Paste link"><input id="qty" placeholder="Quantity" oninput="calculate()"><button class="primary" onclick="confirmOrder()">Submit Order</button>

</div></div><div id="services" class="section"><div class="card"><table class="table" id="serviceTable"></table></div></div><div id="orders" class="section"><div class="card"><table class="table" id="orderTable"></table></div></div><div id="admin" class="section"><div class="card"><h3>Add Service</h3><input id="aname" placeholder="Service name">
<input id="aid" placeholder="Service ID">
<input id="arate" placeholder="Rate">
<input id="amin" placeholder="Min">
<input id="amax" placeholder="Max"><button class="primary" onclick="addService()">Add Service</button>

</div></div></div><div id="modal" class="modal"><div class="modal-box"><h3>Confirm Order</h3><div id="summary"></div><button class="primary" onclick="sendOrder()">Send Order</button>

</div></div><script>

var services={

"Instagram Followers":{id:101,rate:199,min:100,max:100000},

"Instagram Likes":{id:102,rate:99,min:50,max:50000},

"YouTube Subscribers":{id:201,rate:399,min:100,max:50000},

"YouTube Watch Hours":{id:202,rate:4999,min:4000,max:4000},

"Telegram Members":{id:301,rate:1899,min:1000,max:100000}

}

var orders=JSON.parse(localStorage.getItem("orders")||"[]")

function loadServices(){

var s=document.getElementById("service")

s.innerHTML=""

for(var key in services){

s.innerHTML+=`<option>`+key+`</option>`

}

renderServiceTable()

serviceChanged()

}

function renderServiceTable(){

var table=document.getElementById("serviceTable")

table.innerHTML=""

for(var key in services){

let d=services[key]

table.innerHTML+=`<tr><td>#`+d.id+`</td><td>`+key+`</td></tr>`

}

}

function serviceChanged(){

var name=service.value
var d=services[name]

sid.innerText=d.id
min.innerText=d.min
max.innerText=d.max
rate.innerText=d.rate

calculate()

}

function calculate(){

var qty=qty.value
var d=services[service.value]

if(!qty)return

total.innerText=Math.round((qty/1000)*d.rate)

}

function confirmOrder(){

var serviceName=service.value
var quantity=qty.value
var linkVal=link.value
var totalVal=total.innerText

summary.innerHTML=
"Service: "+serviceName+"<br>"+
"Qty: "+quantity+"<br>"+
"Total: ₹"+totalVal

modal.style.display="flex"

}

function sendOrder(){

var serviceName=service.value
var quantity=qty.value
var linkVal=link.value
var totalVal=total.innerText

orders.push({service:serviceName,qty:quantity})

localStorage.setItem("orders",JSON.stringify(orders))

renderOrders()

var phone="91XXXXXXXXXX"

var msg="New Order%0AService:"+serviceName+"%0ALink:"+linkVal+"%0AQty:"+quantity+"%0ATotal:₹"+totalVal

window.open("https://wa.me/"+phone+"?text="+msg)

modal.style.display="none"

}

function renderOrders(){

var table=document.getElementById("orderTable")

table.innerHTML=""

orders.forEach((o,i)=>{

table.innerHTML+=`<tr><td>#`+(5000+i)+`</td><td>`+o.service+`</td><td>Completed</td></tr>`

})

}

function searchService(){

var input=search.value.toLowerCase()

for(var i=0;i<service.options.length;i++){

var txt=service.options[i].text.toLowerCase()

service.options[i].style.display=txt.includes(input)?"":"none"

}

}

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

title.innerText=id.charAt(0).toUpperCase()+id.slice(1)

}

function animateStats(){

let a=0,b=0,c=0,d=0

let i=setInterval(()=>{

if(a<120)a++
if(b<orders.length)b++
if(c<90)c++
if(d<12)d++

s1.innerText=a
s2.innerText=b
s3.innerText=c
s4.innerText=d

if(a>=120)clearInterval(i)

},20)

}

function addService(){

var name=aname.value

services[name]={

id:aid.value,
rate:arate.value,
min:amin.value,
max:amax.value

}

loadServices()

}

loadServices()
renderOrders()
animateStats()

</script></body>
</html>
