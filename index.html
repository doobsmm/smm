<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TITO SMM PANEL</title><style>

body{
font-family:Arial;
background:#050b18;
color:white;
margin:0;
}

.header{
background:#0f1b2e;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.platforms{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:18px;
padding:18px;
background:#081326;
}

.platform img{
width:38px;
cursor:pointer;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

label{
font-size:14px;
color:#9ca3af;
}

select,input{
width:100%;
padding:13px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

.description{
background:#111827;
padding:14px;
border-radius:8px;
font-size:13px;
color:#cbd5e1;
margin-bottom:16px;
line-height:1.5;
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
}

</style></head><body><div class="header">
TITO SMM PANEL
</div><div class="platforms"><img onclick="setPlatform('instagram')" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"><img onclick="setPlatform('youtube')" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"><img onclick="setPlatform('telegram')" src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"><img onclick="setPlatform('tiktok')" src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png"><img onclick="setPlatform('facebook')" src="https://cdn-icons-png.flaticon.com/512/733/733547.png"><img onclick="setPlatform('twitter')" src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png"><img onclick="setPlatform('spotify')" src="https://cdn-icons-png.flaticon.com/512/174/174872.png"></div><div class="container"><label>Category</label>

<select id="category" onchange="loadServices()"></select>

<label>Service</label>

<select id="service" onchange="showDescription()"></select>

<label>Service Description</label>

<div id="desc" class="description">
Select a service to see details.
</div><label>Link</label>
<input id="link" placeholder="Paste link">

<label>Quantity</label>
<input id="qty" placeholder="Example 1000">

<button onclick="order()">Submit Order</button>

</div><script>

var platform="instagram"

function setPlatform(p){
platform=p
updateCategories()
}

function updateCategories(){

var c=document.getElementById("category")

c.innerHTML=""

if(platform=="instagram"){
c.innerHTML+=`<option value="followers">Followers</option>`
c.innerHTML+=`<option value="likes">Likes</option>`
c.innerHTML+=`<option value="views">Views</option>`
c.innerHTML+=`<option value="comments">Comments</option>`
c.innerHTML+=`<option value="reels">Reel Packages</option>`
c.innerHTML+=`<option value="fpackages">Follower Packages</option>`
c.innerHTML+=`<option value="engagement">Engagement Packages</option>`
c.innerHTML+=`<option value="vlikes">Verified Likes</option>`
c.innerHTML+=`<option value="vcomments">Verified Comments</option>`
}

if(platform=="youtube"){
c.innerHTML+=`<option value="subs">Subscribers</option>`
c.innerHTML+=`<option value="views">Views</option>`
c.innerHTML+=`<option value="watchtime">Watch Time</option>`
}

if(platform=="telegram"){
c.innerHTML+=`<option value="members">Members</option>`
c.innerHTML+=`<option value="views">Post Views</option>`
}

if(platform=="tiktok"){
c.innerHTML+=`<option value="followers">Followers</option>`
c.innerHTML+=`<option value="likes">Likes</option>`
}

if(platform=="facebook"){
c.innerHTML+=`<option value="followers">Page Followers</option>`
c.innerHTML+=`<option value="likes">Post Likes</option>`
}

if(platform=="twitter"){
c.innerHTML+=`<option value="followers">Followers</option>`
}

if(platform=="spotify"){
c.innerHTML+=`<option value="plays">Song Plays</option>`
}

loadServices()

}

function loadServices(){

var cat=document.getElementById("category").value
var s=document.getElementById("service")

s.innerHTML=""

if(platform=="instagram" && cat=="followers"){
s.innerHTML+=`<option>1000 Followers</option>`
s.innerHTML+=`<option>5000 Followers</option>`
}

if(platform=="instagram" && cat=="likes"){
s.innerHTML+=`<option>1000 Likes</option>`
}

if(platform=="instagram" && cat=="views"){
s.innerHTML+=`<option>10000 Views</option>`
}

if(platform=="instagram" && cat=="comments"){
s.innerHTML+=`<option>Random Comments</option>`
s.innerHTML+=`<option>Custom Comments</option>`
}

if(platform=="instagram" && cat=="reels"){
s.innerHTML+=`<option>Reel Boost Package</option>`
}

if(platform=="instagram" && cat=="engagement"){
s.innerHTML+=`<option>Starter Engagement Pack</option>`
}

if(platform=="youtube" && cat=="subs"){
s.innerHTML+=`<option>1000 Subscribers</option>`
}

if(platform=="youtube" && cat=="views"){
s.innerHTML+=`<option>10000 Views</option>`
}

if(platform=="youtube" && cat=="watchtime"){
s.innerHTML+=`<option>4000 Watch Hours</option>`
}

if(platform=="telegram" && cat=="members"){
s.innerHTML+=`<option>10000 Members</option>`
}

if(platform=="tiktok" && cat=="followers"){
s.innerHTML+=`<option>1000 Followers</option>`
}

if(platform=="spotify" && cat=="plays"){
s.innerHTML+=`<option>10000 Plays</option>`
}

showDescription()

}

var descriptions={

"1000 Followers":"High quality followers delivered gradually to maintain account safety.",
"5000 Followers":"Growth package for influencers who want faster follower growth.",
"1000 Likes":"Fast delivery likes to boost engagement on your posts.",
"10000 Views":"High retention views that help increase reach and visibility.",
"Random Comments":"Realistic random comments added to improve engagement.",
"Custom Comments":"Send your own comments and we will post them manually.",
"Reel Boost Package":"Designed to push reels into higher reach and discovery.",
"Starter Engagement Pack":"Combination of followers, likes and views to kickstart engagement.",
"1000 Subscribers":"Organic style subscriber growth for your channel.",
"4000 Watch Hours":"Package designed to help channels reach monetization faster.",
"10000 Members":"Targeted Telegram members added gradually.",
"1000 Followers":"TikTok follower growth package.",
"10000 Plays":"Boost your Spotify track plays for higher algorithm reach."

}

function showDescription(){

var service=document.getElementById("service").value

if(descriptions[service]){
document.getElementById("desc").innerText=descriptions[service]
}else{
document.getElementById("desc").innerText="Service details will appear here."
}

}

function order(){

var service=document.getElementById("service").value
var link=document.getElementById("link").value
var qty=document.getElementById("qty").value

var phone="917207207597"

var msg="New Order%0APlatform: "+platform+"%0AService: "+service+"%0ALink: "+link+"%0AQuantity: "+qty

window.open("https://wa.me/"+phone+"?text="+msg)

}

updateCategories()

</script></body>
</html>
